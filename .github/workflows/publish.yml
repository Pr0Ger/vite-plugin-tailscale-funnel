name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          JSR_VERSION=$(node -p "require('./jsr.json').version")

          test "$TAG" = "$PACKAGE_VERSION" || {
            echo "Tag version ($TAG) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          }

          test "$TAG" = "$JSR_VERSION" || {
            echo "Tag version ($TAG) does not match jsr.json ($JSR_VERSION)"
            exit 1
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --access public --provenance

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          JSR_VERSION=$(node -p "require('./jsr.json').version")

          test "$TAG" = "$PACKAGE_VERSION" || {
            echo "Tag version ($TAG) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          }

          test "$TAG" = "$JSR_VERSION" || {
            echo "Tag version ($TAG) does not match jsr.json ($JSR_VERSION)"
            exit 1
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to JSR
        run: npx --yes jsr publish
